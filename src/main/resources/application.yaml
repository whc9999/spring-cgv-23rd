spring:
  application:
    name: spring-boot

  datasource:
    url: jdbc:mysql://localhost:3306/${database}?allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=UTF-8
    username: root
    password: ${password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  logging:
    level:
      org.hibernate.SQL: debug

jwt:
  secret: ${JWT_SECRET}
  token-validity-in-seconds: 3600

payment:
  base-url: https://ceos.diggindie.com
  store-id: whc9999
  api-secret-key: ${PAYMENT_API_SECRET_KEY:}
