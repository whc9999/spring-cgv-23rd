server:
  port: ${PORT:8080}

spring:
  application:
    name: spring-boot

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?sslMode=REQUIRED&allowPublicKeyRetrieval=true&useSSL=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  logging:
    level:
      org.hibernate.SQL: debug

jwt:
  secret: ${JWT_SECRET}
  token-validity-in-seconds: 3600

payment:
  base-url: https://ceos.diggindie.com
  store-id: whc9999
  api-secret-key: ${PAYMENT_API_SECRET_KEY:}
